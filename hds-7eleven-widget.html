<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HDS × 7-Eleven | Items in Transit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: transparent; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    :root { --bg-primary:#ffffff; --bg-secondary:#f4f5f7; --text-primary:#111827; --text-secondary:#6b7280; --border:#e5e7eb; --blue:#2F71F3; --green:#22c55e; --amber:#f59e0b; --navy:#1B2B4B; --road-bg:#0f1e38; --radius-lg:12px; --radius-md:8px; }
    .w { width:100%; max-width:520px; border:0.5px solid var(--border); border-radius:var(--radius-lg); background:var(--bg-primary); overflow:hidden; }

    /* Header: navy left, white right, road in the middle */
    .header { padding:12px 16px; display:flex; align-items:center; gap:12px; background: linear-gradient(to right, #1B2B4B 0%, #1B2B4B 30%, #26407a 48%, #6b8fc9 58%, #ffffff 72%, #ffffff 100%); }
    .hds-logo { height:26px; width:auto; flex-shrink:0; }
    .seven-logo { height:38px; width:auto; flex-shrink:0; }

    /* Road */
    .road-wrap { flex:1; overflow:hidden; }
    .road { height:22px; position:relative; overflow:hidden; border-radius:4px; background:var(--road-bg); }
    .road-line { position:absolute; top:50%; transform:translateY(-50%); height:2px; width:100%; }
    .dash { position:absolute; top:0; height:2px; width:16px; background:rgba(255,255,255,0.2); border-radius:1px; animation:dash 2.4s linear infinite; }
    @keyframes dash { 0%{left:-16px} 100%{left:100%} }
    .truck { position:absolute; top:50%; transform:translateY(-50%); animation:drive 5.5s linear infinite; }
    @keyframes drive { 0%{left:-36px;opacity:0} 6%{opacity:1} 90%{opacity:1} 100%{left:calc(100% + 36px);opacity:0} }

    /* Body */
    .body { padding:20px; }
    .live-row { display:flex; align-items:center; gap:6px; margin-bottom:16px; }
    .live-dot { width:7px; height:7px; border-radius:50%; background:var(--blue); animation:blink 1.5s ease-in-out infinite; flex-shrink:0; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .live-label { font-size:11px; font-weight:500; color:var(--blue); letter-spacing:0.06em; text-transform:uppercase; }
    .store-label { font-size:12px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:4px; }
    .store-name { font-size:17px; font-weight:600; color:var(--text-primary); margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .store-dot { width:8px; height:8px; border-radius:50%; background:var(--green); flex-shrink:0; animation:blink 2s ease-in-out infinite; }
    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .stat { background:var(--bg-secondary); border-radius:var(--radius-md); padding:14px 16px; }
    .stat-label { font-size:11px; color:var(--text-secondary); margin-bottom:6px; }
    .stat-val { font-size:26px; font-weight:500; color:var(--text-primary); line-height:1; }
    .stat-unit { font-size:12px; color:var(--text-secondary); margin-top:3px; }
    .divider { height:0.5px; background:var(--border); margin:0 0 16px; }
    .meta-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    .meta { text-align:center; }
    .meta-val { font-size:14px; font-weight:500; color:var(--text-primary); }
    .meta-label { font-size:11px; color:var(--text-secondary); margin-top:2px; }
    .footer { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; border-top:0.5px solid var(--border); background:var(--bg-secondary); }
    .footer-txt { font-size:11px; color:var(--text-secondary); }
    .green { color:var(--green); font-weight:500; }
    .amber { color:var(--amber); font-weight:500; }
  </style>
</head>

  // Read location ID from URL: ?yourLocationId=XXXX
  const params = new URLSearchParams(window.location.search);
  const locationId = params.get('yourLocationId') ?? 'default';

  // Stable per-store item count seeded from the locationId
  // Replace with a real API call when your backend is ready:
  // fetch('/api/transit?storeId=' + locationId).then(r => r.json()).then(d => { ... })
  function seedFromId(id) {
    let hash = 0;
    for (let i = 0; i < id.length; i++) {
      hash = (hash << 5) - hash + id.charCodeAt(i);
      hash |= 0;
    }
    return Math.abs(hash);
  }
  const storeItems = 18 + (seedFromId(locationId) % 30);

  document.getElementById('store-name').textContent =
    locationId !== 'default'
      ? '7-Eleven ' + locationId
      : '7-Eleven';

  function fmt(n) { return Math.floor(n).toLocaleString('en-AU'); }

  function getEDT() {
    const now = new Date(), hr = now.getHours(), min = now.getMinutes();
    if (hr >= 5 && hr < 12) {
      const e = new Date(now); e.setHours(hr < 9 ? 9 : hr + 1, min > 30 ? 0 : 30, 0);
      return { val: e.toLocaleTimeString('en-AU', {hour:'2-digit', minute:'2-digit'}), sub: 'Morning run · on time', cls: 'stat-val green' };
    } else if (hr >= 12 && hr < 17) {
      const e = new Date(now); e.setHours(hr + 1, min > 30 ? 0 : 30, 0);
      return { val: e.toLocaleTimeString('en-AU', {hour:'2-digit', minute:'2-digit'}), sub: 'Afternoon run · on time', cls: 'stat-val green' };
    } else if (hr >= 17 && hr < 21) {
      const e = new Date(now); e.setHours(hr + 1, min > 30 ? 0 : 30, 0);
      return { val: e.toLocaleTimeString('en-AU', {hour:'2-digit', minute:'2-digit'}), sub: 'Evening run · on time', cls: 'stat-val green' };
    } else {
      const t = new Date(now); t.setDate(t.getDate() + 1); t.setHours(7, 0, 0, 0);
      return { val: t.toLocaleTimeString('en-AU', {hour:'2-digit', minute:'2-digit'}), sub: 'Next run · tomorrow am', cls: 'stat-val amber' };
    }
  }

  function tick() {
    const now = new Date();
    const startDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const secsDay = (now - startDay) / 1000;
    document.getElementById('items').textContent = storeItems;
    document.getElementById('today-items').textContent = fmt(secsDay * 0.223);
    document.getElementById('today-kms').textContent = fmt(secsDay * 0.476);
    const edt = getEDT(), el = document.getElementById('edt');
    el.textContent = edt.val; el.className = edt.cls;
    document.getElementById('edt-sub').textContent = edt.sub;
    document.getElementById('updated').textContent = 'Updated ' + now.toLocaleTimeString('en-AU', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  }
  tick(); setInterval(tick, 1000);
</script>
</body>
</html>
