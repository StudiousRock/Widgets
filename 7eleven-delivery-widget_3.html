<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>7-Eleven Delivery Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1c1c1e;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      padding: 0;
    }

    /* ── Portrait aspect ratio ── */
    .aspect-wrap {
      width: 100%;
      max-width: 500px;
      aspect-ratio: 9 / 16;
      position: relative;
    }

    .widget {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: #2c2c2e;
      border-radius: 16px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    }

    /* ── Header ── */
    .header {
      background: #169165;
      padding: 0 18px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }



    /* HDS logo */
    .hds-logo {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hds-icon {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
    }
    .hds-text {
      font-size: 22px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 1px;
    }

    /* ── Store row ── */
    .store-row {
      background: #2c2c2e;
      padding: 11px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 1px solid #3a3a3c;
    }
    .store-name { font-size: 15px; font-weight: 700; color: #ffffff; }
    .store-id   { font-size: 12px; color: #8e8e93; margin-top: 1px; }
    .item-badge {
      background: #3a3a3c;
      border-radius: 20px;
      padding: 5px 11px;
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600; color: #ffffff;
    }
    .badge-icon {
      width: 18px; height: 18px;
      background: #169165;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── ETA card ── */
    .eta-card {
      background: #3f3e43;
      margin: 10px 12px 6px;
      border-radius: 12px;
      padding: 14px 18px;
      text-align: center;
      flex-shrink: 0;
    }
    .eta-label { font-size: 12px; color: #aeaeb2; margin-bottom: 3px; }
    .eta-time  { font-size: 28px; font-weight: 800; color: #ffffff; line-height: 1.15; }
    .eta-date  { font-size: 12px; color: #aeaeb2; margin-top: 3px; }

    /* ── Progress card ── */
    .progress-card {
      background: #3f3e43;
      margin: 0 12px 6px;
      border-radius: 12px;
      padding: 12px 16px 10px;
      flex-shrink: 0;
    }
    .stops-label {
      font-size: 13px; color: #aeaeb2;
      text-align: center; margin-bottom: 10px;
    }
    .stops-label strong { color: #ffffff; }

    .progress-track {
      position: relative;
      height: 40px;
      display: flex; align-items: center;
    }
    .track-bar {
      position: absolute;
      left: 20px; right: 20px;
      height: 5px;
      background: #5a5a5e;
      border-radius: 3px;
      overflow: visible;
    }
    .track-fill {
      height: 100%;
      width: 68%;
      background: #169165;
      border-radius: 3px;
      position: relative;
    }
    .track-fill::after {
      content: '';
      position: absolute;
      right: -6px; top: 50%;
      transform: translateY(-50%);
      width: 12px; height: 12px;
      background: #169165;
      border-radius: 50%;
      border: 2px solid #3f3e43;
    }
    .node {
      position: absolute;
      width: 38px; height: 38px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      z-index: 2;
    }
    .node.start { left: 0; background: #169165; }
    .node.end   { right: 0; background: #3a3a3c; border: 2px solid #5a5a5e; }

    .view-journey-btn {
      margin: 10px auto 0;
      background: #4a4a4e;
      border: none; border-radius: 20px;
      padding: 7px 18px;
      color: #aeaeb2; font-size: 13px;
      cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      font-family: inherit;
    }

    /* ── Order card ── */
    .order-card {
      background: #2c2c2e;
      margin: 0 12px 6px;
      border-radius: 12px;
      padding: 12px 16px;
      flex-shrink: 0;
    }
    .order-top {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .order-left { display: flex; align-items: center; gap: 11px; }
    .order-icon {
      width: 44px; height: 44px;
      background: #ffffff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .order-label { font-size: 11px; color: #8e8e93; }
    .order-id    { font-size: 15px; font-weight: 700; color: #ffffff; margin-top: 2px; }
    .view-order-btn {
      background: #ffffff; color: #000000;
      font-size: 13px; font-weight: 700;
      border: none; border-radius: 20px;
      padding: 8px 15px; cursor: pointer;
      font-family: inherit; white-space: nowrap;
    }
    .item-tags { display: flex; gap: 10px; }
    .item-tag {
      display: flex; align-items: center; gap: 5px;
      font-size: 13px; font-weight: 600; color: #ffffff;
    }
    .tag-dot { width: 10px; height: 10px; border-radius: 50%; }
    .tag-dot.green { background: #30d158; }
    .tag-dot.red   { background: #ff453a; }

    /* ── Map ── */
    .map-wrap {
      height: 520px;
      margin: 0 12px 12px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }
    .map-wrap iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }
  </style>
</head>

<script>
  // ── URL parameters ───────────────────────────────────────────────────────
  const params     = new URLSearchParams(window.location.search);
  const locationId = params.get('externalLocationId') ?? 'South Yarra';
  const address    = params.get('address')            ?? '627 Chapel St, South Yarra VIC 3141';

  // ── Store name ───────────────────────────────────────────────────────────
  document.getElementById('store-name').textContent = '7-Eleven ' + locationId;

  // ── Date ─────────────────────────────────────────────────────────────────
  function ordinal(n) {
    const s = ['th','st','nd','rd'], v = n % 100;
    return n + (s[(v-20)%10] || s[v] || s[0]);
  }
  const now  = new Date();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const mons = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('eta-date').textContent =
    days[now.getDay()] + ' ' + ordinal(now.getDate()) + ' ' + mons[now.getMonth()] + ' ' + now.getFullYear();

  // ── Map ───────────────────────────────────────────────────────────────────
  const encoded = encodeURIComponent(address);
  document.getElementById('map-frame').src =
    'https://maps.google.com/maps?q=' + encoded + '&t=m&z=15&output=embed&iwloc=near';
</script>
